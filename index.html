<!DOCTYPE html>
<html lang="pt-br">
<head>

        body {
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 380px;
            border: 2px solid #00ff9c;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 0 20px rgba(0, 255, 156, 0.3);
            text-align: center;
            box-sizing: border-box;
        }

        .header-title {
            color: #00ff9c;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        /* 🔒 CADEADO EM CÓDIGO (NUNCA BUGARÁ) */
        .cadeado-svg {
            width: 140px;
            margin: 0 auto 15px;
            display: block;
            filter: drop-shadow(0 0 8px #00ff9c);
        }

        .btns-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-small {
            background: rgba(0, 255, 156, 0.1);
            border: 1px solid #00ff9c;
            color: #00ff9c;
            padding: 8px;
            border-radius: 8px;
            font-size: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .btn-gerar {
            width: 100%;
            background: #00ff9c;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 10px;
            box-shadow: 0 0 10px #00ff9c;
        }

        /* 🛡️ CAIXA DE DADOS BLINDADA (RESOLVE O CORTE) */
        .box-dados {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 15px;
            text-align: left;
            font-size: 13px;
            line-height: 1.6;
            margin-top: 10px;
            /* Trava para não cortar texto */
            white-space: pre-wrap;
            word-break: break-all; 
            display: none;
        }

        .status {
            color: #00ff9c;
            font-size: 11px;
            margin-bottom: 10px;
            display: none;
        }

        .btn-copiar {
            width: 100%;
            background: transparent;
            border: 1px solid #00ff9c;
            color: #00ff9c;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

</script>

</body>
</html>
