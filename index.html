<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP_PAINEL APKBUGADO PRO</title>
    <style>
        /* Estilo Centralizado e Compacto */
        body {
            background: #000;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        /* O Painel da Foto */
        .painel-pro {
            width: 100%;
            max-width: 380px;
            background: #000;
            border: 2px solid #00ff9c;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 0 0 25px rgba(0, 255, 156, 0.5);
            text-align: center;
            position: relative;
        }

        .titulo-neon {
            color: #00ff9c;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        /* 🔒 CADEADO GERADO POR CÓDIGO (SVG) */
        .svg-cadeado {
            width: 150px;
            height: auto;
            display: block;
            margin: 0 auto 20px auto;
            filter: drop-shadow(0 0 10px rgba(0, 255, 156, 0.7));
        }

        /* Botões Superiores Lado a Lado */
        .grid-atalhos {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-link {
            background: rgba(0, 255, 156, 0.1);
            border: 1px solid #00ff9c;
            color: #00ff9c;
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-link:hover {
            transform: scale(1.05);
            background: rgba(0, 255, 156, 0.2);
        }

        /* Inputs e Botão de Ação */
        input {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 10px;
            box-sizing: border-box;
            text-align: center;
            font-size: 16px;
        }

        input:focus { border-color: #00ff9c; }

        .btn-gerar {
            width: 100%;
            padding: 15px;
            background: #00ff9c;
            color: #000;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 156, 0.4);
            text-transform: uppercase;
        }

        .btn-gerar:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* 🛡️ BOX DE RESULTADO (BLINDADO CONTRA BUG) */
        pre#out {
            background: #0a0a0a;
            padding: 15px;
            margin-top: 15px;
            border-radius: 12px;
            font-size: 12px;
            text-align: left;
            border: 1px dashed #333;
            color: #fff;
            
            /* Correção definitiva para o link longo quebrando o layout */
            white-space: pre-wrap;      /* Mantém quebras de linha */
            word-break: break-all;      /* FORÇA QUEBRA DE LINKS GIGANTES */
            word-wrap: break-word; 
            overflow-x: hidden;         /* Impede rolagem lateral */
            line-height: 1.5;
        }

        .status-txt {
            color: #00ff9c;
            font-size: 11px;
            margin: 10px 0;
            font-weight: bold;
        }

        .destaque-neon { color: #00ff9c; }
    </style>
</head>
<body>

<div class="painel-pro">
    <div class="titulo-neon">[ VIP_PAINEL ]</div>
    
    <svg class="svg-cadeado" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="95" fill="#000" stroke="#00ff9c" stroke-width="2"/>
        <path d="M100 20 L100 180 M20 100 L180 100" stroke="#00ff9c22" stroke-width="1"/>
        <path d="M150 70 A 50 50 0 1 1 50 70 A 50 50 0 0 1 150 70" fill="#00ff9c22" stroke="#00ff9c" stroke-width="3"/>
        <text x="100" y="65" text-anchor="middle" font-size="16" fill="#00ff9c" font-family="Courier, monospace" font-weight="bold">VIP</text>
        <rect x="55" y="105" width="90" height="70" rx="10" ry="10" fill="#000" stroke="#00ff9c" stroke-width="3"/>
        <circle cx="100" cy="140" r="15" fill="#000" stroke="#00ff9c" stroke-width="3"/>
        <path d="M100 155 L100 170" stroke="#00ff9c" stroke-width="3"/>
        <path d="M100 80 L100 105 M92 115 A 8 8 0 0 1 108 115" stroke="#00ff9c" stroke-width="2"/>
    </svg>

    <div class="grid-atalhos">
        <a href="https://t.me/ApkBugadoGrupo" class="btn-atalho btn-link">💎 GRUPO VIP</a>
        <a href="https://t.me/ApkBugado" class="btn-atalho btn-link">📢 CANAL</a>
    </div>

    <div id="login-section">
        <input type="password" id="key" placeholder="Digite código VIP">
        <button class="btn-gerar" onclick="validar()">DESBLOQUEAR SISTEMA</button>
    </div>

    <div id="painel-section" style="display:none;">
        <button id="btn-gerar" class="btn-gerar" onclick="gerarListas()">⚡ GERAR NOVA LISTA PREMIUM</button>
        
        <div class="status-txt" id="status-txt">🟢 STATUS: AGUARDANDO COMANDO</div>

        <pre id="out">Clique em GERAR para buscar a lista.</pre>
        
        <button id="btn-copiar" class="btn-gerar" onclick="copiar()" style="background:#111; color:#00ff9c; border:1px solid #00ff9c; margin-top:10px; display:none;">📋 COPIAR DADOS</button>
    </div>
</div>

<script>
    function validar() {
        const pass = document.getElementById('key').value.trim();
        if(pass === "9085") { // Mude a senha aqui
            document.getElementById('area-login').style.display = "none";
            document.getElementById('painel-section').style.display = "block";
        } else {
            alert("Código VIP inválido, Mestre!");
            document.getElementById('key').value = '';
        }
    }

    function proximoMes() {
        let d = new Date();
        d.setMonth(d.getMonth() + 1);
        return d.toLocaleDateString();
    }

    function gerarListas() {
        let out = document.getElementById('out');
        let status = document.getElementById('status-txt');
        let btnGerar = document.getElementById('btn-gerar');
        let btnCopiar = document.getElementById('btn-copiar');

        // Limpa a tela na hora
        out.textContent = "⚙️ INICIANDO BYPASS...";
        status.textContent = "🔴 STATUS: CONECTANDO...";
        btnGerar.disabled = true;

        setTimeout(() => {
            // Link longo que costumava quebrar o layout
            const linkLonguissimo = "http://bluebox.click:80/get.php?username=Felipe8263v&password=Luchini63&type=m3u_plus&output=ts";
            
            status.innerHTML = `🟢 STATUS: LISTA PRONTA (<span class="destaque-neon">1 Hosts</span> ON)`;
            out.innerHTML = `💎 VIP APKBUGADO PREMIUM\n\n🔗 URL M3U:\n<span class="destaque-neon">${linkLonguissimo}</span>\n\n⚙️ XTREAM CODES:\nHost: http://bluebox.click:80\nUser: Felipe8263v\nPass: Luchini63\n\n📅 Vencimento: ${proximoMes()}\n━━━━━━━━━━━━━━━━━\n📢 CANAL: t.me/ApkBugado`;
            
            btnGerar.disabled = false;
            btnCopiar.style.display = "block";
        }, 1200);
    }

    function copiar() {
        const textoValores = document.getElementById('out').innerText;
        if(textoValores.includes("Clique") || textoValores.includes("INICIANDO")) return;
        
        // Remove tags HTML se tiver
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = textoValores;
        const textoLimpo = tempDiv.textContent;

        navigator.clipboard.writeText(textoLimpo);
        alert("✅ Dados copiados para o seu Poco M6!");
    }
</script>

</body>
</html>
