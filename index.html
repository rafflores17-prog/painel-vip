<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP APKBUGADO MASTER</title><style>
body{background:#020617;color:#00ff9c;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{background:#020617;padding:20px;border-radius:15px;width:420px;border:1px solid #00ff9c;text-align:center;box-shadow:0 0 20px #00ff9c33}
button,input,a{width:100%;padding:12px;border:none;border-radius:10px;margin-top:10px;text-decoration:none;display:block}
button{background:#00ff9c;color:#000;font-weight:bold;cursor:pointer}
input{background:#000;color:#00ff9c;text-align:center}
a{background:#001f1a;color:#00ff9c;font-size:13px}
pre{margin-top:10px;font-size:12px;background:#000;padding:10px;border-radius:10px;white-space:pre-wrap;text-align:left}
.scan{font-size:11px;margin-top:5px;color:#00ffaa}
.info{font-size:11px;margin-top:5px;color:#00ffaa}
img{width:80px;margin-bottom:10px}
</style></head>
<body><div class="card"><img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png">
<h3>🔐 GRUPO VIP PAINEL</h3><a href="https://is.gd/th2b0P" target="_blank">💎 ENTRAR GRUPO VIP</a> <a href="https://t.me/ApkBugado" target="_blank">📢 GRUPO ABERTO</a>

<input type="password" id="senha" placeholder="Digite código VIP">
<button onclick="desbloquear()">DESBLOQUEAR</button><div id="painel" style="display:none;">
<button onclick="gerar()">GERAR LISTA</button>
<button onclick="copiar()">COPIAR</button><div class="scan" id="scan"></div>
<div class="info" id="info"></div>
<pre id="out">Aguardando...</pre>
</div></div><script>

const senhaCorreta = "1234";
const base = "https://raw.githubusercontent.com/rafflores17-prog/painel-vip/main/";
const total = 2;

let usados = [];

function desbloquear(){
let s = document.getElementById('senha').value;
if(s === senhaCorreta){
 document.getElementById('painel').style.display = 'block';
}else{
 alert("Código inválido!");
}
}

function proximoMes(){
let d = new Date();
d.setMonth(d.getMonth()+1);
return d.toLocaleDateString();
}

async function gerar(){

let scan = document.getElementById('scan');
let out = document.getElementById('out');
let info = document.getElementById('info');

let etapas = [
 "🔍 Iniciando scanner...",
 "🌐 Conectando ao servidor...",
 "📡 Buscando combos ativos...",
 "⚙️ Processando dados...",
 "✅ Finalizando..."
];

for(let i=0;i<etapas.length;i++){
  scan.textContent = etapas[i];
  await new Promise(r=>setTimeout(r,300));
}

let tentativas = 0;

while(tentativas < 10){
try{

let n = Math.floor(Math.random() * total) + 1;
let url = `${base}combo${n}.txt`;

let res = await fetch(url);
let txt = await res.text();

let blocos = txt.split(/┏●-•~¹°”ˆ˜¨/);
let validos = [];

blocos.forEach(b=>{
  let host = (b.match(/Host[:►]\s*(http[^\s]+)/i)||[])[1];
  let user = (b.match(/Usu[aá]rio[:►]\s*(.*)/i)||[])[1];
  let pass = (b.match(/Senha[:►]\s*(.*)/i)||[])[1];

  if(host && user && pass){
    let chave = user+pass;
    if(!usados.includes(chave)){
      validos.push({host,user,pass,chave});
    }
  }
});

if(validos.length === 0){
 usados = [];
 tentativas++;
 continue;
}

let c = validos[Math.floor(Math.random()*validos.length)];
usados.push(c.chave);

let m3u = `${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=m3u8`;

let agora = new Date().toLocaleString();
let exp = proximoMes();

let resultado = `📺 LISTA VIP APKBUGADO

🔗 M3U:
${m3u}

⚙️ XTREAM:
Host: ${c.host}
User: ${c.user}
Pass: ${c.pass}

📅 Expira: ${exp}

━━━━━━━━━━━━━━
⏱️ Scan: ${agora}`;

out.textContent = resultado;
scan.textContent = "🟢 Online";
info.textContent = `📊 Combos disponíveis: ${validos.length} | Usados: ${usados.length}`;

return;

}catch(e){
 tentativas++;
}
}

out.textContent = "Erro ao gerar!";

}

function copiar(){
let texto = document.getElementById('out').textContent;
navigator.clipboard.writeText(texto);
alert('Copiado!');
}

</script></body>
</html>
