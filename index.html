<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAINEL VIP APKBUGADO PRO</title>

<style>
body {
    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    padding: 15px;
}

/* CARD */
.card-painel {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    border: 1px solid #00ff9c;
    border-radius: 20px;
    box-shadow:
        0 0 30px rgba(0,255,156,0.4),
        inset 0 0 10px rgba(0,255,156,0.2);
    text-align: center;
}

/* TÍTULO */
.title-hacker {
    color: #00ff9c;
    font-size: 20px;
    letter-spacing: 4px;
    margin-bottom: 15px;
}

/* LOGO */
.logo-vip {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
}

.circle {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    border: 3px solid #00ff9c;
    box-shadow: 
        0 0 25px #00ff9c,
        inset 0 0 15px #00ff9c55;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

/* ANEL GIRANDO */
.circle::before {
    content: "";
    position: absolute;
    width: 270px;
    height: 270px;
    border-radius: 50%;
    border: 2px dashed #00ff9c44;
    animation: girar 8s linear infinite;
}

@keyframes girar {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

/* IMAGEM */
.circle img {
    width: 220px;
    height: 220px;
    object-fit: cover;
    border-radius: 50%;
    filter:
        drop-shadow(0 0 10px #00ff9c)
        drop-shadow(0 0 25px #00ff9c);
}

/* BOTÕES TOPO */
.links-topo {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
}

.btn-atalho {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: bold;
    text-decoration: none;
    display: flex;
    justify-content: center;
    gap: 5px;
    border: 1px solid #00ff9c;
    color: #00ff9c;
    background: #012;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #00ff9c;
    background: #000;
    color: #00ff9c;
    text-align: center;
    font-size: 15px;
}

/* BOTÕES */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    background: transparent;
    border: 1px solid #00ff9c;
    color: #00ff9c;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #00ff9c;
    color: #000;
}

/* STATUS */
.loader-status {
    margin-top: 10px;
    font-size: 12px;
    color: #00ff9c;
}

/* RESULTADO */
pre#out {
    background: #020202;
    padding: 15px;
    margin-top: 15px;
    border-radius: 15px;
    font-size: 12px;
    text-align: left;
    color: #00ff9c;
    border: 1px solid #00ff9c;

    max-height: 280px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
}

.destaque-neon { color: #00ff9c; }
.data-gerado { font-size: 10px; color: #888; }
</style>
</head>

<body>

<div class="card-painel">
    <div class="title-hacker">[ VIP_PAINEL ]</div>

    <!-- LOGO -->
    <div class="logo-vip">
        <div class="circle">
            <img src="vip.png">
        </div>
    </div>

    <!-- LINKS -->
    <div class="links-topo">
        <a href="https://is.gd/th2b0P" target="_blank" class="btn-atalho">💎 ENTRAR VIP</a>
        <a href="https://t.me/ApkBugado" target="_blank" class="btn-atalho">📢 GRUPO</a>
    </div>

    <!-- LOGIN -->
    <div id="login-box">
        <input type="password" id="senha" placeholder="Digite código VIP">
        <button onclick="login()">DESBLOQUEAR</button>
    </div>

    <!-- PAINEL -->
    <div id="painel" style="display:none;">
        <button id="btn-gerar" onclick="gerar()">GERAR LISTA</button>
        <button onclick="copiar()">COPIAR</button>

        <div class="loader-status" id="status">STATUS: AGUARDANDO...</div>
        <pre id="out">Clique em GERAR para buscar a lista.</pre>
    </div>
</div>

<script>
const senhaCorreta = "1234";
const baseGithub = "https://raw.githubusercontent.com/rafflores17-prog/painel-vip/main/";

const arquivos = [];
for(let i = 1; i <= 30; i++) arquivos.push(`combo${i}.txt`);

let listaGlobal = [];
let usados = [];
let emProcesso = false;

function login(){
    let s = document.getElementById('senha').value.trim();
    if(s === senhaCorreta){
        document.getElementById('painel').style.display = "block";
        document.getElementById('login-box').style.display = "none";
    } else {
        alert("Código inválido!");
    }
}

function proximoMes(){
    let d = new Date();
    d.setMonth(d.getMonth()+1);
    return d.toLocaleDateString();
}

function extrairM3U(texto){
    let lista = [];
    let links = texto.match(/http[^\s]+get\.php[^\s]+/g) || [];
    links.forEach(link=>{
        let user = (link.match(/username=([^&]+)/)||[])[1];
        let pass = (link.match(/password=([^&]+)/)||[])[1];
        let host = link.split("/get.php")[0];
        if(user && pass && host) lista.push({link,user,pass,host,key:user+pass});
    });
    return lista;
}

async function carregarBancoDeDados(){
    if(listaGlobal.length > 0) return;

    let btn = document.getElementById('btn-gerar');
    let out = document.getElementById('out');

    btn.disabled = true;
    out.textContent = "SINCRONIZANDO...";

    for(let f of arquivos){
        try{
            let r = await fetch(baseGithub + f);
            if(r.ok){
                let txt = await r.text();
                listaGlobal = listaGlobal.concat(extrairM3U(txt));
            }
        }catch(e){}
    }

    let unico = {};
    listaGlobal.forEach(c => unico[c.key] = c);
    listaGlobal = Object.values(unico);

    btn.disabled = false;
    out.textContent = "PRONTO PARA GERAR";
}

async function gerar(){
    if(emProcesso) return;
    emProcesso = true;

    let btn = document.getElementById('btn-gerar');
    let status = document.getElementById('status');
    let out = document.getElementById('out');

    btn.disabled = true;
    out.textContent = "PROCESSANDO...";
    status.textContent = "CONECTANDO...";

    if(listaGlobal.length === 0) await carregarBancoDeDados();

    let fases = ["MINERANDO...", "VALIDANDO...", "FINALIZANDO..."];
    for(let f of fases){
        status.textContent = f;
        await new Promise(r => setTimeout(r, 500));
    }

    let disponivel = listaGlobal.filter(c => !usados.includes(c.key));
    if(disponivel.length === 0){ usados = []; disponivel = listaGlobal; }

    let combo = disponivel[Math.floor(Math.random() * disponivel.length)];
    usados.push(combo.key);

    let dataGerado = new Date().toLocaleTimeString();

    out.innerHTML =
`💎 <span class="destaque-neon">VIP APKBUGADO PREMIUM</span>

🔗 URL:
${combo.link}

⚙️ XTREAM:
Host: ${combo.host}
User: ${combo.user}
Pass: ${combo.pass}

📅 Vencimento: ${proximoMes()}
━━━━━━━━━━━━━━
⏱️ <span class="data-gerado">${dataGerado}</span>`;

    status.innerHTML = `🟢 STATUS: PRONTO (${listaGlobal.length} HOSTS)`;

    btn.disabled = false;
    emProcesso = false;
}

function copiar(){
    let out = document.getElementById('out');
    navigator.clipboard.writeText(out.textContent);
    alert("Copiado!");
}
</script>

</body>
</html>
