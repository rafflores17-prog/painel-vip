<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAINEL VIP APKBUGADO</title>
<style>
    body { background:#000; color:#00ff9c; font-family:monospace; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; padding: 20px; box-sizing: border-box; }
    .card { width:100%; max-width:420px; padding:20px; border:1px solid #00ff9c; border-radius:15px; box-shadow:0 0 25px #00ff9c55; text-align:center; position: relative; background: #000; }
    
    .lock-icon { font-size: 50px; margin-bottom: 10px; text-shadow: 0 0 15px #00ff9c; display: block; }
    .title-panel { font-size: 18px; font-weight: bold; margin: 5px 0; letter-spacing: 2px; }

    .links-top { display: flex; gap: 10px; margin-bottom: 20px; margin-top: 10px; }
    .btn-top { flex: 1; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 11px; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s; text-transform: uppercase; }
    .btn-vip { background: #004d2f; color: #00ff9c; border: 1px solid #00ff9c; }
    .btn-free { background: #1a1a1a; color: #00ff9c; border: 1px solid #333; }
    .btn-top:hover { transform: scale(1.05); filter: brightness(1.2); }

    button, input { width:100%; padding:14px; margin-top:10px; border-radius:10px; border:none; font-family:monospace; box-sizing: border-box; }
    button { background:#00ff9c; font-weight:bold; cursor:pointer; text-transform:uppercase; color: #000; }
    button:disabled { background:#004d2f; color:#008552; cursor:not-allowed; }
    
    input { background:#000; color:#00ff9c; border:1px solid #00ff9c; text-align:center; outline:none; }
    
    /* 🛠️ AQUI ESTÁ A CORREÇÃO DO BUG DE LAYOUT */
    pre { 
        background:#0a0a0a; 
        padding:15px; 
        margin-top:15px; 
        border-radius:10px; 
        font-size:12px; 
        text-align:left; 
        white-space: pre-wrap;      /* Mantém quebras de linha */
        word-break: break-all;      /* FORÇA A QUEBRA DE LINKS LONGOS */
        word-wrap: break-word; 
        border:1px solid #00ff9c22; 
        min-height:160px; 
        color:#fff; 
        line-height: 1.5;
        overflow-x: hidden;         /* Impede a barra de rolagem lateral */
    }
    
    .loader { font-size:11px; margin-top:10px; color:#00ff9c; font-weight:bold; min-height:18px; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="card">
    <span class="lock-icon">🔒</span>
    <div class="title-panel">[ VIP_PAINEL ]</div>
    
    <div class="links-top">
        <a href="https://is.gd/th2b0P" target="_blank" class="btn-top btn-vip">💎 VIP GRUPO</a>
        <a href="https://t.me/ApkBugado" target="_blank" class="btn-top btn-free">📢 CANAL OFICIAL</a>
    </div>

    <div id="login-box">
        <input type="password" id="senha" placeholder="INSIRA SEU CÓDIGO">
        <button onclick="login()">ACESSAR SISTEMA</button>
    </div>

    <div id="painel" style="display:none;">
        <button id="btn-gerar" onclick="gerar()">⚡ GERAR NOVA LISTA</button>
        <button onclick="copiar()" style="background:#111; color:#00ff9c; border:1px solid #00ff9c; margin-top:8px;">📋 COPIAR DADOS</button>
        
        <div class="loader" id="status">STATUS: AGUARDANDO...</div>
        <pre id="out">Pronto para gerar...</pre>
    </div>
</div>

<script>
// O RESTANTE DO SEU SCRIPT CONTINUA IGUAL...
const senhaCorreta = "1234";
const base = "https://raw.githubusercontent.com/rafflores17-prog/painel-vip/main/";

const arquivos = [];
for(let i = 1; i <= 30; i++) {
    arquivos.push(`combo${i}.txt`);
}

let listaGlobal = [];
let usados = [];
let emProcesso = false;

function login(){
    let s = document.getElementById('senha').value.trim();
    if(s === senhaCorreta){
        document.getElementById('painel').style.display = "block";
        document.getElementById('login-box').style.display = "none";
    } else {
        alert("Código inválido!");
    }
}

function proximoMes(){
    let d = new Date();
    d.setMonth(d.getMonth()+1);
    return d.toLocaleDateString();
}

function extrairM3U(texto){
    let lista = [];
    let regex = /http[^\s]+get\.php[^\s]+/g;
    let links = texto.match(regex) || [];
    links.forEach(link=>{
        let user = (link.match(/username=([^&]+)/)||[])[1];
        let pass = (link.match(/password=([^&]+)/)||[])[1];
        let host = link.split("/get.php")[0];
        if(user && pass && host) lista.push({link, user, pass, host, key: user+pass});
    });
    return lista;
}

async function carregarBanco(){
    if(listaGlobal.length > 0) return;
    for(let f of arquivos){
        try {
            let r = await fetch(base + f);
            if(r.ok) {
                let txt = await r.text();
                listaGlobal = listaGlobal.concat(extrairM3U(txt));
            }
        } catch(e){ }
    }
    let unico = {};
    listaGlobal.forEach(c => unico[c.key] = c);
    listaGlobal = Object.values(unico);
}

async function gerar(){
    if(emProcesso) return;
    emProcesso = true;

    let btn = document.getElementById('btn-gerar');
    let status = document.getElementById('status');
    let out = document.getElementById('out');

    out.textContent = "🔄 ACESSANDO SERVIDOR...";
    status.textContent = "🔴 STATUS: CONECTANDO...";
    btn.disabled = true;

    await carregarBanco();

    if(listaGlobal.length === 0) {
        out.textContent = "❌ Erro: Nenhum combo encontrado.";
        status.textContent = "🔴 STATUS: ERRO";
        btn.disabled = false;
        emProcesso = false;
        return;
    }

    let frases = ["🔍 BUSCANDO...", "📡 SINCRONIZANDO...", "🚀 FINALIZANDO!"];
    for(let f of frases){
        status.textContent = "🟡 STATUS: " + f;
        await new Promise(r => setTimeout(r, 400));
    }

    let disponivel = listaGlobal.filter(c => !usados.includes(c.key));
    if(disponivel.length === 0){ usados = []; disponivel = listaGlobal; }

    let c = disponivel[Math.floor(Math.random() * disponivel.length)];
    usados.push(c.key);

    let resultado = `💎 VIP APKBUGADO PREMIUM

🔗 URL M3U:
${c.link}

⚙️ DADOS XTREAM:
Host: ${c.host}
User: ${c.user}
Pass: ${c.pass}

📅 Vencimento: ${proximoMes()}
━━━━━━━━━━━━━━━━━
📢 CANAL: t.me/ApkBugado
━━━━━━━━━━━━━━━━━
⏱️ Gerado em: ${new Date().toLocaleTimeString()}`;

    out.textContent = resultado;
    status.textContent = "🟢 STATUS: LISTA PRONTA (" + listaGlobal.length + " ON)";
    btn.disabled = false;
    emProcesso = false;
}

function copiar(){
    let texto = document.getElementById('out').textContent;
    if(texto.includes("Pronto") || texto.includes("ACESSANDO")) return;
    navigator.clipboard.writeText(texto);
    alert("✅ Dados copiados!");
}
</script>
</body>
</html>
