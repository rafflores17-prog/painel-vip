<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP APKBUGADO MASTER</title>
<style>
    /* Estilo Hacker / Cyberpunk */
    :root {
        --neon-green: #00ff9c;
        --neon-purple: #9d00ff;
        --dark-bg: #020617;
        --darker-bg: #000000;
    }

    body {
        background: var(--dark-bg);
        color: var(--neon-green);
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        padding: 10px;
        box-sizing: border-box;
    }

    .card {
        background: var(--dark-bg);
        padding: 25px 20px;
        border-radius: 12px;
        width: 100%;
        max-width: 400px;
        border: 1px solid var(--neon-purple);
        text-align: center;
        box-shadow: 0 0 15px rgba(157, 0, 255, 0.3), inset 0 0 10px rgba(0, 255, 156, 0.1);
    }

    .logo-img {
        width: 70px;
        margin-bottom: 15px;
        filter: drop-shadow(0 0 5px var(--neon-green));
    }

    h3 {
        margin: 0 0 20px 0;
        letter-spacing: 2px;
        color: var(--neon-green);
        text-shadow: 0 0 5px var(--neon-green);
    }

    button, input, a {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 8px;
        margin-top: 12px;
        text-decoration: none;
        display: block;
        box-sizing: border-box;
        font-family: 'Courier New', Courier, monospace;
        font-weight: bold;
        transition: 0.3s ease;
    }

    button {
        background: var(--neon-green);
        color: #000;
        cursor: pointer;
        text-transform: uppercase;
    }

    button:hover:not(:disabled) {
        background: var(--neon-purple);
        color: #fff;
        box-shadow: 0 0 10px var(--neon-purple);
    }

    button:disabled {
        background: #333;
        color: #666;
        cursor: not-allowed;
    }

    input {
        background: var(--darker-bg);
        color: var(--neon-green);
        text-align: center;
        border: 1px solid #333;
        outline: none;
    }

    input:focus {
        border-color: var(--neon-green);
    }

    .link-group {
        display: flex;
        gap: 10px;
    }

    .link-group a {
        background: #001f1a;
        font-size: 12px;
        border: 1px solid #004d3e;
    }

    .link-group a:hover {
        background: var(--neon-green);
        color: #000;
    }

    pre {
        margin-top: 15px;
        font-size: 12px;
        background: var(--darker-bg);
        padding: 15px;
        border-radius: 8px;
        white-space: pre-wrap;
        word-wrap: break-word;
        text-align: left;
        border: 1px dashed #333;
        color: #fff;
    }

    .status-text {
        font-size: 11px;
        margin-top: 8px;
        color: #aaa;
    }

    .highlight { color: var(--neon-green); }
</style>
</head>
<body>

<div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png" class="logo-img" alt="Logo">
    <h3>[ VIP_PAINEL ]</h3>
    
    <div class="link-group">
        <a href="https://is.gd/th2b0P" target="_blank">💎 VIP</a> 
        <a href="https://t.me/ApkBugado" target="_blank">📢 CANAL</a>
    </div>

    <div id="box-login">
        <input type="password" id="senha" placeholder="Digite a key de acesso">
        <button id="btn-desbloquear" onclick="desbloquear()">Acessar Sistema</button>
    </div>

    <div id="painel" style="display:none;">
        <button id="btn-gerar" onclick="gerar()">⚡ GERAR LISTA ATIVA</button>
        <button onclick="copiar()" style="background: #222; color: #fff; border: 1px solid #444;">📋 COPIAR DADOS</button>
        
        <div class="status-text highlight" id="scan">Status: Aguardando comando...</div>
        <div class="status-text" id="info"></div>
        
        <pre id="out">Output terminal vazio...</pre>
    </div>
</div>

<script>
    const senhaCorreta = "1234";
    const base = "https://raw.githubusercontent.com/rafflores17-prog/painel-vip/main/";
    const total = 2; // Quantidade de arquivos comboX.txt no github
    
    let usados = [];

    // Função de Desbloqueio
    function desbloquear() {
        let s = document.getElementById('senha').value;
        if(s === senhaCorreta) {
            // Esconde a caixa de login e mostra o painel
            document.getElementById('box-login').style.display = 'none';
            document.getElementById('painel').style.display = 'block';
        } else {
            alert("❌ Chave Incorreta!");
            document.getElementById('senha').value = ''; // Limpa o campo
        }
    }

    // Calcula validade
    function proximoMes() {
        let d = new Date();
        d.setMonth(d.getMonth() + 1);
        return d.toLocaleDateString();
    }

    // Função de Geração
    async function gerar() {
        let btn = document.getElementById('btn-gerar');
        let scan = document.getElementById('scan');
        let out = document.getElementById('out');
        let info = document.getElementById('info');

        // Trava o botão para evitar cliques duplos
        btn.disabled = true;
        btn.textContent = "⏳ PROCESSANDO...";

        let etapas = [
            "🔍 Iniciando bypass...",
            "🌐 Conectando à database...",
            "📡 Minerando combos...",
            "⚙️ Validando integridade...",
            "✅ Descriptografando..."
        ];

        // Animação de texto hacker
        for(let i=0; i < etapas.length; i++) {
            scan.textContent = etapas[i];
            await new Promise(r => setTimeout(r, 400));
        }

        let tentativas = 0;
        let sucesso = false;

        while(tentativas < 10 && !sucesso) {
            try {
                let n = Math.floor(Math.random() * total) + 1;
                let url = `${base}combo${n}.txt`;

                let res = await fetch(url);
                if (!res.ok) throw new Error("Arquivo não encontrado no Github");
                let txt = await res.text();

                // Divide pelo padrão da lista
                let blocos = txt.split(/┏●-•~¹°”ˆ˜¨/);
                let validos = [];

                blocos.forEach(b => {
                    // O .trim() salva a vida aqui, tira espaços e quebras de linha invisíveis
                    let host = (b.match(/Host[:►]\s*(http[^\s]+)/i) || [])[1]?.trim();
                    let user = (b.match(/Usu[aá]rio[:►]\s*(.*)/i) || [])[1]?.trim();
                    let pass = (b.match(/Senha[:►]\s*(.*)/i) || [])[1]?.trim();

                    if(host && user && pass) {
                        let chave = user + pass;
                        // Verifica se já não entregamos essa lista hoje
                        if(!usados.includes(chave)) {
                            validos.push({host, user, pass, chave});
                        }
                    }
                });

                if(validos.length === 0) {
                    tentativas++;
                    continue; // Pula para a próxima tentativa se não achar nada
                }

                // Sorteia um dos válidos
                let c = validos[Math.floor(Math.random() * validos.length)];
                usados.push(c.chave);

                let m3u = `${c.host}/get.php?username=${c.user}&password=${c.pass}&type=m3u_plus&output=m3u8`;
                let agora = new Date().toLocaleString();
                let exp = proximoMes();

                let resultado = `📺 VIP APKBUGADO PREMIUM\n\n🔗 URL M3U:\n${m3u}\n\n⚙️ DADOS XTREAM:\nHost: ${c.host}\nUser: ${c.user}\nPass: ${c.pass}\n\n📅 Vencimento: ${exp}\n━━━━━━━━━━━━━━━━━━━━━\n⏱️ Extraído em: ${agora}`;

                out.textContent = resultado;
                scan.textContent = "🟢 STATUS: LISTA PRONTA";
                info.textContent = `📊 Hosts na base: ${validos.length} | Já geradas: ${usados.length}`;
                
                sucesso = true;

            } catch(e) {
                tentativas++;
                console.error("Erro na tentativa", tentativas, e);
            }
        }

        if(!sucesso) {
            out.textContent = "❌ Falha ao encontrar lista ativa ou servidor GitHub indisponível. Recarregue a página.";
            scan.textContent = "🔴 STATUS: ERRO DE CONEXÃO";
        }

        // Libera o botão novamente
        btn.disabled = false;
        btn.textContent = "⚡ GERAR NOVA LISTA";
    }

    // Função de Copiar
    function copiar() {
        let texto = document.getElementById('out').textContent;
        if(texto.includes("Output terminal vazio") || texto.includes("Falha")) {
            alert('⚠️ Gere uma lista primeiro!');
            return;
        }
        navigator.clipboard.writeText(texto);
        alert('✅ Lista copiada com sucesso!');
    }
</script>
</body>
</html>
