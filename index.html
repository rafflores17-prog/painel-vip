<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAINEL VIP APKBUGADO</title>

<style>
body{
  background:#000;
  color:#00ff9c;
  font-family:monospace;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  width:420px;
  padding:20px;
  border:1px solid #00ff9c;
  border-radius:15px;
  box-shadow:0 0 25px #00ff9c55;
  text-align:center;
}

h3{
  margin-top:0;
}

button,input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  font-family:monospace;
}

button{
  background:#00ff9c;
  font-weight:bold;
  cursor:pointer;
}

input{
  background:#000;
  color:#00ff9c;
  border:1px solid #00ff9c;
}

pre{
  background:#000;
  padding:12px;
  margin-top:15px;
  border-radius:10px;
  font-size:12px;
  text-align:left;
  white-space:pre-wrap;
  border:1px solid #00ff9c33;
  min-height:120px;
  transition:0.3s;
}

a{
  display:block;
  margin-top:8px;
  color:#00ff9c;
  text-decoration:none;
  font-size:13px;
}

.loader{
  font-size:12px;
  margin-top:10px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="card">

<h3>💻 PAINEL VIP</h3>

<a href="https://is.gd/th2b0P" target="_blank">💎 GRUPO VIP</a>
<a href="https://t.me/ApkBugado" target="_blank">📢 GRUPO FREE</a>

<input type="password" id="senha" placeholder="Código VIP">
<button onclick="login()">DESBLOQUEAR</button>

<div id="painel" style="display:none;">
<button onclick="gerar()">GERAR LISTA</button>
<button onclick="copiar()">COPIAR</button>

<div class="loader" id="status"></div>

<pre id="out">Aguardando...</pre>
</div>

</div>

<script>

// 🔐 senha
const senhaCorreta = "1234";

// 📂 arquivos github
const base = "https://raw.githubusercontent.com/rafflores17-prog/painel-vip/main/";
const arquivos = ["combo1.txt","combo2.txt"];

let listaGlobal = [];
let usados = [];

// 🔓 login
function login(){
 let s = document.getElementById('senha').value.trim();

 if(s === senhaCorreta){
   document.getElementById('painel').style.display = "block";
   document.getElementById('senha').style.display = "none";
 }else{
   alert("Senha incorreta");
 }
}

// 📅 expiração fake
function proximoMes(){
 let d = new Date();
 d.setMonth(d.getMonth()+1);
 return d.toLocaleDateString();
}

// 🔥 extrai QUALQUER link válido
function extrairM3U(texto){

 let lista = [];

 let links = texto.match(/http[^\s]+get\.php[^\s]+/g) || [];

 links.forEach(link => {

   let user = (link.match(/username=([^&]+)/)||[])[1];
   let pass = (link.match(/password=([^&]+)/)||[])[1];
   let host = link.split("/get.php")[0];

   if(user && pass){
     lista.push({
       link,
       user,
       pass,
       host,
       key: user + pass
     });
   }

 });

 return lista;
}

// 📥 carregar tudo
async function carregar(){

 if(listaGlobal.length > 0) return;

 for(let f of arquivos){
   try{
     let r = await fetch(base + f);
     let txt = await r.text();

     let combos = extrairM3U(txt);
     listaGlobal = listaGlobal.concat(combos);

   }catch(e){
     console.log("erro ao carregar", f);
   }
 }

 // remove duplicados
 let unico = {};
 listaGlobal.forEach(c => unico[c.key] = c);
 listaGlobal = Object.values(unico);
}

// 🚀 gerar
async function gerar(){

 let out = document.getElementById('out');
 let status = document.getElementById('status');

 out.style.opacity = 0.3;
 status.textContent = "🔄 Escaneando servidores...";

 await carregar();

 if(listaGlobal.length === 0){
   out.textContent = "❌ Nenhum combo encontrado";
   return;
 }

 let disponivel = listaGlobal.filter(c => !usados.includes(c.key));

 if(disponivel.length === 0){
   usados = [];
   disponivel = listaGlobal;
 }

 let c = disponivel[Math.floor(Math.random()*disponivel.length)];
 usados.push(c.key);

 status.textContent = "🟢 Servidor Online";

 setTimeout(()=>{
   out.style.opacity = 1;
   out.textContent = `📺 LISTA VIP APKBUGADO

🔗 ${c.link}

⚙️ XTREAM
Host: ${c.host}
User: ${c.user}
Pass: ${c.pass}

📅 Expira: ${proximoMes()}`;
 },300);

}

// 📋 copiar
function copiar(){
 let texto = document.getElementById('out').textContent;
 navigator.clipboard.writeText(texto);
 alert("Copiado!");
}

</script>

</body>
</html>
