<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel VIP Auto PRO</title>
<style>
body{background:#020617;color:#00ff9c;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{background:#020617;padding:20px;border-radius:15px;width:420px;border:1px solid #00ff9c;text-align:center}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#00ff9c;color:#000;font-weight:bold;cursor:pointer;margin-top:10px}
pre{margin-top:10px;font-size:12px;background:#000;padding:10px;border-radius:10px;white-space:pre-wrap}
</style>
</head>
<body>
<div class="card">
<h3>💎 VIP APKBUGADO AUTO PRO</h3><button onclick="gerar()">GERAR LISTA</button> <button onclick="copiar()">COPIAR</button>

<pre id="out">Clique em GERAR...</pre></div>
<script>const total = 50; // 🔥 QUANTIDADE DE ARQUIVOS combo1 até combo50 const base = "https://raw.githubusercontent.com/SEUUSER/REPO/main/";

async function gerar(){ let tentativas = 0; let maxTentativas = 10;

while(tentativas < maxTentativas){

let n = Math.floor(Math.random() * total) + 1; let url = ${base}combo${n}.txt;

try{ let res = await fetch(url); if(!res.ok) throw "erro";

let txt = await res.text();

let host = (txt.match(/Host[:►]\s*(http[^\s]+)/i)||[])[1]; let user = (txt.match(/Usu[aá]rio[:►]\s*(.)/i)||[])[1]; let pass = (txt.match(/Senha[:►]\s(.*)/i)||[])[1];

if(host && user && pass){

let m3u = ${host}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=m3u8;

let resultado = 📺 LISTA VIP APKBUGADO\n\n🔗 M3U:\n${m3u}\n\n⚙️ XTREAM:\nHost: ${host}\nUser: ${user}\nPass: ${pass};

document.getElementById('out').textContent = resultado; return;

}

}catch(e){ // tenta outro }

tentativas++; }

document.getElementById('out').textContent = "Nenhum combo válido encontrado!"; }

function copiar(){ let texto=document.getElementById('out').textContent; navigator.clipboard.writeText(texto); alert('Copiado!'); }

</script>
</body>
</html>
